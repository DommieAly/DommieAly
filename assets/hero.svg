<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 320" width="1000" height="320" fill="none" role="img" aria-label="DommieAly">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#15182b"/>
      <stop offset="55%" stop-color="#0c0e1a"/>
      <stop offset="100%" stop-color="#05060d"/>
    </radialGradient>

    <linearGradient id="red" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff5a5a"/>
      <stop offset="100%" stop-color="#e60000"/>
    </linearGradient>
    <linearGradient id="yellow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff6c2"/>
      <stop offset="100%" stop-color="#ffd84d"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2b5fd0"/>
      <stop offset="100%" stop-color="#0a1f66"/>
    </linearGradient>

    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .name { font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; font-weight: 800; }

      .ltr { opacity: 0; transform-box: fill-box; transform-origin: center; animation: pop .7s ease forwards, float 4.5s ease-in-out infinite; }
      .l1 { animation-delay: .1s, .8s; }
      .l2 { animation-delay: .2s, .9s; }
      .l3 { animation-delay: .3s, 1.0s; }
      .l4 { animation-delay: .4s, 1.1s; }
      .l5 { animation-delay: .5s, 1.2s; }
      .l6 { animation-delay: .6s, 1.3s; }
      .l7 { animation-delay: .7s, 1.4s; }
      .l8 { animation-delay: .8s, 1.5s; }
      .l9 { animation-delay: .9s, 1.6s; }

      @keyframes pop {
        0%   { opacity: 0; transform: translateY(28px) scale(.6); }
        70%  { opacity: 1; transform: translateY(-6px) scale(1.06); }
        100% { opacity: 1; transform: translateY(0) scale(1); }
      }
      @keyframes float {
        0%,100% { transform: translateY(0); }
        50%     { transform: translateY(-9px); }
      }
    </style>
  </defs>

  <rect width="1000" height="320" rx="24" fill="url(#bg)"/>

  <g class="name" filter="url(#glow)" font-size="150" text-anchor="middle">
    <text x="500" y="212">
      <tspan class="ltr l1" fill="url(#red)">D</tspan><tspan class="ltr l2" fill="url(#red)">o</tspan><tspan class="ltr l3" fill="url(#red)">m</tspan><tspan class="ltr l4" fill="url(#yellow)">m</tspan><tspan class="ltr l5" fill="url(#yellow)">i</tspan><tspan class="ltr l6" fill="url(#yellow)">e</tspan><tspan class="ltr l7" fill="url(#blue)">A</tspan><tspan class="ltr l8" fill="url(#blue)">l</tspan><tspan class="ltr l9" fill="url(#blue)">y</tspan>
    </text>
  </g>
</svg>
