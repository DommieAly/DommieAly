      <tspan x="116" fill="url(#red)">D</tspan><tspan x="219" fill="url(#red)">o</tspan><tspan x="344" fill="url(#red)">m</tspan><tspan x="500" fill="url(#yellow)">m</tspan><tspan x="600" fill="url(#yellow)">&#305;</tspan><tspan x="666" fill="url(#yellow)">e</tspan><tspan x="762" fill="url(#blue)">A</tspan><tspan x="834" fill="url(#blue)">l</tspan><tspan x="897" fill="url(#blue)">y</tspan>
