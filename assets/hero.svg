<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 300" width="1000" height="300" fill="none" role="img" aria-label="DommieAly">
  <defs>
    <linearGradient id="red" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff5a5a"/>
      <stop offset="100%" stop-color="#e60000"/>
    </linearGradient>
    <linearGradient id="yellow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd84d"/>
      <stop offset="100%" stop-color="#f0b400"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2b5fd0"/>
      <stop offset="100%" stop-color="#0a1f66"/>
    </linearGradient>

    <style>
      .name { font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; font-weight: 800; }

      .ltr { opacity: 0; transform-box: fill-box; transform-origin: center bottom; animation: pop .7s ease forwards; }
      .l1 { animation-delay: .1s; }
      .l2 { animation-delay: .2s; }
      .l3 { animation-delay: .3s; }
      .l4 { animation-delay: .4s; }
      .l5 { animation-delay: .5s; }
      .l6 { animation-delay: .6s; }
      .l7 { animation-delay: .7s; }
      .l8 { animation-delay: .8s; }
      .l9 { animation-delay: .9s; }

      @keyframes pop {
        0%   { opacity: 0; transform: translateY(34px) scale(.5); }
        70%  { opacity: 1; transform: translateY(-8px) scale(1.08); }
        100% { opacity: 1; transform: translateY(0) scale(1); }
      }
    </style>
  </defs>

  <rect x="1" y="1" width="998" height="298" rx="20" fill="#ffffff" stroke="#e5e7eb"/>

  <g class="name" font-size="150" text-anchor="middle">
    <text x="500" y="200">
      <tspan class="ltr l1" fill="url(#red)">D</tspan><tspan class="ltr l2" fill="url(#red)">o</tspan><tspan class="ltr l3" fill="url(#red)">m</tspan><tspan class="ltr l4" fill="url(#yellow)">m</tspan><tspan class="ltr l5" fill="url(#yellow)">i</tspan><tspan class="ltr l6" fill="url(#yellow)">e</tspan><tspan class="ltr l7" fill="url(#blue)">A</tspan><tspan class="ltr l8" fill="url(#blue)">l</tspan><tspan class="ltr l9" fill="url(#blue)">y</tspan>
    </text>
  </g>
</svg>
