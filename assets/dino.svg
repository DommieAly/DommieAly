<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="800" height="220" fill="none" role="img" aria-label="Dino jump game">
  <defs>
    <style>
      .ui { font-family: 'Courier New', monospace; fill: #9aa0a6; }

      /* Dino auto-jump, synced so it clears the cactus */
      .dino { transform-box: fill-box; transform-origin: center bottom; animation: jump 2.2s ease-in-out infinite; }
      @keyframes jump {
        0%, 64%   { transform: translateY(0); }
        78%       { transform: translateY(-78px); }
        92%, 100% { transform: translateY(0); }
      }

      /* running legs */
      .legA { transform-box: fill-box; animation: stepA .26s steps(1) infinite; }
      .legB { transform-box: fill-box; animation: stepB .26s steps(1) infinite; }
      @keyframes stepA { 0%,49% { opacity: 1; } 50%,100% { opacity: 0; } }
      @keyframes stepB { 0%,49% { opacity: 0; } 50%,100% { opacity: 1; } }

      /* obstacles scrolling */
      .obs1 { animation: run1 2.2s linear infinite; }
      .obs2 { animation: run2 3.4s linear infinite; }
      @keyframes run1 { from { transform: translateX(820px); } to { transform: translateX(-60px); } }
      @keyframes run2 { from { transform: translateX(820px); } to { transform: translateX(-60px); } }

      /* drifting clouds */
      .cloud { animation: drift 9s linear infinite; }
      .cloud2 { animation: drift 14s linear infinite; }
      @keyframes drift { from { transform: translateX(820px); } to { transform: translateX(-120px); } }

      .blink { animation: blink 1.1s steps(1) infinite; }
      @keyframes blink { 0%,50% { opacity: 1; } 51%,100% { opacity: .25; } }
    </style>
  </defs>

  <rect x="1" y="1" width="798" height="218" rx="20" fill="#ffffff" stroke="#e5e7eb"/>

  <!-- score -->
  <text class="ui" x="760" y="40" text-anchor="end" font-size="18" letter-spacing="2">HI 04 <tspan class="blink">20</tspan></text>

  <!-- clouds -->
  <g fill="#dfe2e6">
    <g class="cloud"><path d="M0 60 h34 a10 10 0 0 0 0 -20 h-18 a8 8 0 0 0 -16 4 a9 9 0 0 0 0 16 z" transform="translate(120,0)"/></g>
    <g class="cloud2"><path d="M0 90 h34 a10 10 0 0 0 0 -20 h-18 a8 8 0 0 0 -16 4 a9 9 0 0 0 0 16 z" transform="translate(420,0)"/></g>
  </g>

  <!-- ground -->
  <line x1="20" y1="178" x2="780" y2="178" stroke="#bdc1c6" stroke-width="2"/>
  <g stroke="#d4d7db" stroke-width="2">
    <line x1="60" y1="186" x2="80" y2="186"/>
    <line x1="180" y1="186" x2="195" y2="186"/>
    <line x1="320" y1="186" x2="345" y2="186"/>
    <line x1="500" y1="186" x2="515" y2="186"/>
    <line x1="640" y1="186" x2="668" y2="186"/>
  </g>

  <!-- DINO (feet rest on ground at y=178) -->
  <g class="dino">
    <g fill="#535353" transform="translate(70,131)">
      <!-- tail -->
      <rect x="0" y="14" width="6" height="6"/>
      <rect x="0" y="8" width="4" height="8"/>
      <!-- body -->
      <rect x="4" y="14" width="22" height="18"/>
      <!-- neck -->
      <rect x="20" y="6" width="8" height="12"/>
      <!-- head -->
      <rect x="24" y="0" width="20" height="16"/>
      <!-- snout -->
      <rect x="42" y="8" width="6" height="5"/>
      <!-- eye -->
      <rect x="38" y="3" width="3" height="3" fill="#ffffff"/>
      <!-- arm -->
      <rect x="22" y="22" width="6" height="3"/>
      <!-- legs pose A -->
      <g class="legA">
        <rect x="8" y="32" width="6" height="15"/>
        <rect x="18" y="32" width="6" height="11"/>
        <rect x="6" y="46" width="9" height="3"/>
      </g>
      <!-- legs pose B -->
      <g class="legB">
        <rect x="8" y="32" width="6" height="11"/>
        <rect x="18" y="32" width="6" height="15"/>
        <rect x="17" y="46" width="9" height="3"/>
      </g>
    </g>
  </g>

  <!-- CACTUS 1 -->
  <g class="obs1">
    <g fill="#535353" transform="translate(0,140)">
      <rect x="8" y="10" width="8" height="38"/>
      <rect x="0" y="20" width="6" height="16"/>
      <rect x="0" y="20" width="8" height="6"/>
      <rect x="18" y="16" width="6" height="14"/>
      <rect x="16" y="16" width="8" height="6"/>
    </g>
  </g>

  <!-- CACTUS 2 (taller cluster) -->
  <g class="obs2">
    <g fill="#535353" transform="translate(0,128)">
      <rect x="10" y="6" width="9" height="44"/>
      <rect x="0" y="22" width="7" height="18"/>
      <rect x="0" y="22" width="10" height="7"/>
      <rect x="22" y="18" width="7" height="16"/>
      <rect x="19" y="18" width="10" height="7"/>
    </g>
  </g>
</svg>
