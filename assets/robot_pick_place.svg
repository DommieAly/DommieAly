<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="800" height="220" fill="none" role="img" aria-label="Robot arm pick and place: Vision, Language, Action cubes">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&amp;display=swap');
      .lab { font-family: 'Comic Sans MS','Comic Neue','Chalkboard SE',cursive; font-weight: 700; }

      .carriage { animation: ax 12s linear infinite; }
      @keyframes ax {
        0%   { transform: translateX(400px); }
        3%   { transform: translateX(85px); }
        11%  { transform: translateX(85px); }
        18%  { transform: translateX(610px); }
        25%  { transform: translateX(610px); }
        29%  { transform: translateX(125px); }
        37%  { transform: translateX(125px); }
        44%  { transform: translateX(650px); }
        51%  { transform: translateX(650px); }
        55%  { transform: translateX(165px); }
        63%  { transform: translateX(165px); }
        70%  { transform: translateX(690px); }
        77%  { transform: translateX(690px); }
        82%  { transform: translateX(400px); }
        100% { transform: translateX(400px); }
      }

      .claw { animation: ay 12s linear infinite; }
      @keyframes ay {
        0%,3% { transform: translateY(0); }
        7%    { transform: translateY(30px); }
        11%,18% { transform: translateY(0); }
        22%   { transform: translateY(30px); }
        25%,29% { transform: translateY(0); }
        33%   { transform: translateY(30px); }
        37%,44% { transform: translateY(0); }
        48%   { transform: translateY(30px); }
        51%,55% { transform: translateY(0); }
        59%   { transform: translateY(30px); }
        63%,70% { transform: translateY(0); }
        74%   { transform: translateY(30px); }
        77%   { transform: translateY(0); }
        100%  { transform: translateY(0); }
      }

      .cube-r { animation: cr 12s linear infinite; }
      @keyframes cr {
        0%   { transform: translate(0,0); opacity: 1; }
        7%   { transform: translate(0,0); }
        11%  { transform: translate(0,-30px); }
        18%  { transform: translate(525px,-30px); }
        22%  { transform: translate(525px,0); }
        95%  { transform: translate(525px,0); opacity: 1; }
        99%,100% { transform: translate(525px,0); opacity: 0; }
      }
      .cube-y { animation: cy 12s linear infinite; }
      @keyframes cy {
        0%   { transform: translate(0,0); opacity: 1; }
        33%  { transform: translate(0,0); }
        37%  { transform: translate(0,-30px); }
        44%  { transform: translate(525px,-30px); }
        48%  { transform: translate(525px,0); }
        95%  { transform: translate(525px,0); opacity: 1; }
        99%,100% { transform: translate(525px,0); opacity: 0; }
      }
      .cube-b { animation: cb 12s linear infinite; }
      @keyframes cb {
        0%   { transform: translate(0,0); opacity: 1; }
        59%  { transform: translate(0,0); }
        63%  { transform: translate(0,-30px); }
        70%  { transform: translate(525px,-30px); }
        74%  { transform: translate(525px,0); }
        95%  { transform: translate(525px,0); opacity: 1; }
        99%,100% { transform: translate(525px,0); opacity: 0; }
      }
    </style>
  </defs>

  <rect x="1.5" y="1.5" width="797" height="217" rx="32" fill="#ffffff" stroke="#eceef1" stroke-width="1.5"/>

  <!-- gantry -->
  <rect x="30" y="30" width="740" height="7" rx="3" fill="#cfd4de"/>
  <rect x="30" y="30" width="7" height="126" rx="3" fill="#e3e6ec"/>
  <rect x="763" y="30" width="7" height="126" rx="3" fill="#e3e6ec"/>

  <!-- table -->
  <rect x="30" y="150" width="740" height="6" rx="3" fill="#e7e9ee"/>

  <!-- goal zone (fully inside frame) -->
  <rect x="578" y="110" width="144" height="48" rx="10" fill="#f4f6ff" stroke="#9db4f0" stroke-width="2" stroke-dasharray="6 6"/>
  <text class="lab" x="650" y="103" text-anchor="middle" font-size="12" fill="#8a93a3" letter-spacing="3">GOAL</text>

  <!-- cubes (source on the left; animated symmetrically into the goal) -->
  <g class="cube-r">
    <rect x="70" y="120" width="30" height="30" rx="5" fill="#e60000"/>
    <rect x="74" y="124" width="22" height="7" rx="3" fill="#ffffff" opacity="0.25"/>
    <text class="lab" x="85" y="142" text-anchor="middle" font-size="17" fill="#ffffff">V</text>
  </g>
  <g class="cube-y">
    <rect x="110" y="120" width="30" height="30" rx="5" fill="#f0b400"/>
    <rect x="114" y="124" width="22" height="7" rx="3" fill="#ffffff" opacity="0.3"/>
    <text class="lab" x="125" y="142" text-anchor="middle" font-size="17" fill="#5a4500">L</text>
  </g>
  <g class="cube-b">
    <rect x="150" y="120" width="30" height="30" rx="5" fill="#1a47b8"/>
    <rect x="154" y="124" width="22" height="7" rx="3" fill="#ffffff" opacity="0.25"/>
    <text class="lab" x="165" y="142" text-anchor="middle" font-size="17" fill="#ffffff">A</text>
  </g>

  <!-- robot arm -->
  <g class="carriage">
    <g class="claw">
      <rect x="-1.5" y="16" width="3" height="56" fill="#aab0bc"/>
      <rect x="-11" y="70" width="22" height="6" rx="2" fill="#6f7889"/>
      <rect x="-9" y="76" width="4" height="14" rx="1" fill="#6f7889"/>
      <rect x="5" y="76" width="4" height="14" rx="1" fill="#6f7889"/>
    </g>
    <rect x="-16" y="14" width="32" height="44" rx="6" fill="#8b93a3"/>
    <rect x="-9" y="22" width="18" height="5" rx="2" fill="#aab0bc"/>
    <circle cx="0" cy="42" r="4.5" fill="#3f4654"/>
  </g>

  <!-- legend -->
  <g class="lab" font-size="13" fill="#444b5a">
    <rect x="243" y="197" width="12" height="12" rx="3" fill="#e60000"/><text x="261" y="207">VISION</text>
    <rect x="358" y="197" width="12" height="12" rx="3" fill="#f0b400"/><text x="376" y="207">LANGUAGE</text>
    <rect x="493" y="197" width="12" height="12" rx="3" fill="#1a47b8"/><text x="511" y="207">ACTION</text>
  </g>
</svg>
